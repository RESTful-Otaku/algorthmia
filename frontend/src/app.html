<!DOCTYPE html>
<html lang="en" %sveltekit.theme%>
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/algorthmia.ico" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/algorthmia.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Interactive Algorithm Visualizer - Learn algorithms through step-by-step visualization" />
		<meta name="keywords" content="algorithms, visualization, sorting, learning, computer science" />
		<meta name="author" content="Algorithm Visualizer" />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://algorthmia.vercel.app/" />
		<meta property="og:title" content="Algorithm Visualizer" />
		<meta property="og:description" content="Interactive Algorithm Visualizer - Learn algorithms through step-by-step visualization" />
		<meta property="og:image" content="%sveltekit.assets%/algorthmia.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://algorthmia.vercel.app/" />
		<meta property="twitter:title" content="Algorithm Visualizer" />
		<meta property="twitter:description" content="Interactive Algorithm Visualizer - Learn algorithms through step-by-step visualization" />
		<meta property="twitter:image" content="%sveltekit.assets%/algorthmia.png" />

		<!-- Preload critical resources -->
		<link rel="preload" href="%sveltekit.assets%/app.css" as="style" />
		
		<!-- DNS prefetch for external resources -->
		<link rel="dns-prefetch" href="//fonts.googleapis.com" />
		<link rel="dns-prefetch" href="//api.algorthmia.com" />
		
		<!-- Theme color -->
		<meta name="theme-color" content="#3b82f6" />
		
		<!-- Apple touch icon -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/algorthmia.png" />
		
		<!-- Manifest -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
		<div style="display: contents">%sveltekit.body%</div>
		
		<!-- Service Worker Registration -->
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('/sw.js')
						.then(registration => {
							console.log('SW registered: ', registration);
						})
						.catch(registrationError => {
							console.log('SW registration failed: ', registrationError);
						});
				});
			}
		</script>
	</body>
</html>
