name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Dependencies
        run: |
          go mod download
          bun install --frozen-lockfile
        working-directory: .

      - name: Run Go Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m ./backend/...

      - name: Run Go Format Check
        run: |
          if [ "$(gofmt -s -l ./backend/)" ]; then
            echo "Go code is not formatted. Run 'gofmt -s -w ./backend/'"
            exit 1
          fi

      - name: Run Frontend Lint
        run: bun run lint
        working-directory: ./frontend

      - name: Run Frontend Format Check
        run: bun run format:check
        working-directory: ./frontend

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
        node-version: ['18', '20']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Dependencies
        run: |
          go mod download
          bun install --frozen-lockfile
        working-directory: .

      - name: Run Backend Tests
        run: go test ./backend/... -v -race -coverprofile=coverage-${{ matrix.go-version }}.out
        working-directory: .

      - name: Run Frontend Tests
        run: bun run test
        working-directory: ./frontend

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage-${{ matrix.go-version }}.out
          flags: backend-go${{ matrix.go-version }}
          name: backend-coverage-go${{ matrix.go-version }}

  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Dependencies
        run: |
          go mod download
          bun install --frozen-lockfile
        working-directory: .

      - name: Build Backend
        run: |
          cd backend
          go build -o bin/server ./cmd/server
          go build -o bin/test ./cmd/test

      - name: Build Frontend
        run: bun run build
        working-directory: ./frontend

      - name: Test Docker Build
        run: |
          docker build -t algorthmia:test .
          docker run --rm algorthmia:test --version

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Go Security Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./backend/...

      - name: Run Frontend Security Audit
        run: bun audit
        working-directory: ./frontend

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Dependencies
        run: |
          go mod download
          bun install --frozen-lockfile
        working-directory: .

      - name: Build Application
        run: |
          cd backend && go build -o bin/server ./cmd/server
          cd ../frontend && bun run build

      - name: Start Backend
        run: |
          cd backend
          ./bin/server &
          sleep 5

      - name: Run Performance Tests
        run: |
          # Add performance tests here
          # Example: k6 run performance-tests.js
          echo "Performance tests would run here"

      - name: Check Bundle Size
        run: |
          cd frontend
          bun run build
          # Check if bundle size is within limits
          du -sh build/
          # Add bundle size check logic here

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Dependencies
        run: |
          go mod download
          bun install --frozen-lockfile
        working-directory: .

      - name: Build Application
        run: |
          cd backend && go build -o bin/server ./cmd/server
          cd ../frontend && bun run build

      - name: Start Services
        run: |
          cd backend && ./bin/server &
          cd ../frontend && bun run preview --port 5173 &
          sleep 10

      - name: Run Integration Tests
        run: |
          chmod +x scripts/test-integration.sh
          ./scripts/test-integration.sh

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [lint-and-format, test, build, security, performance, integration]
    if: always()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## PR Check Results')
            );
            
            const results = {
              'Lint and Format': '${{ needs.lint-and-format.result }}',
              'Tests': '${{ needs.test.result }}',
              'Build': '${{ needs.build.result }}',
              'Security': '${{ needs.security.result }}',
              'Performance': '${{ needs.performance.result }}',
              'Integration': '${{ needs.integration.result }}'
            };
            
            const statusEmoji = (status) => {
              switch(status) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '⏹️';
                default: return '⏳';
              }
            };
            
            const commentBody = `## PR Check Results
            
            | Check | Status |
            |-------|--------|
            ${Object.entries(results).map(([name, status]) => 
              `| ${name} | ${statusEmoji(status)} ${status} |`
            ).join('\n')}
            
            <details>
            <summary>Details</summary>
            
            - **Lint and Format**: Code style and formatting checks
            - **Tests**: Unit and integration tests
            - **Build**: Application build verification
            - **Security**: Vulnerability and security scans
            - **Performance**: Performance and bundle size checks
            - **Integration**: End-to-end integration tests
            
            </details>`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
