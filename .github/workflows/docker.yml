name: 🐳 Docker Build & Push

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: algorthmia

jobs:
  build-and-push:
    name: 🏗️ Build & Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: 🐳 Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: 📝 Create deployment summary
      run: |
        echo "## 🐳 Docker Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Docker image built successfully" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Multi-platform build (linux/amd64, linux/arm64)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
        echo "- 🏷️ Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
