name: 🚀 Deploy to Fly.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.21'

jobs:
  deploy:
    name: 🚀 Deploy to Fly.io
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: 🔧 Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        
    - name: 📦 Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: 🏗️ Build frontend
      working-directory: ./frontend
      run: npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://algorthmia-api.herokuapp.com' }}
        
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔐 Login to Fly.io
      uses: superfly/flyctl-actions/setup-flyctl@master
      with:
        version: latest
        
    - name: 🔑 Deploy to Fly.io
      run: flyctl deploy --dockerfile Dockerfile.fly --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        
    - name: 📝 Create deployment summary
      run: |
        echo "## 🚀 Fly.io Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Frontend built successfully" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Deployed to Fly.io" >> $GITHUB_STEP_SUMMARY
        echo "- 🔗 App URL: https://${{ secrets.FLY_APP_NAME || 'algorthmia' }}.fly.dev" >> $GITHUB_STEP_SUMMARY
        echo "- 🌍 Global edge deployment" >> $GITHUB_STEP_SUMMARY
