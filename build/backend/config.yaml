server:
  host: "localhost"
  port: 8080
  read_timeout: 30
  write_timeout: 30

logging:
  level: "info"
  format: "json"

cors:
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "http://localhost:4173"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"

algorithms:
  max_array_size: 100
  default_array_size: 20
  min_array_size: 5
  max_speed: 10
  min_speed: 1
  default_speed: 5
